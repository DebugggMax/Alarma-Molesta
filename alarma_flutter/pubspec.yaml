name: alarma_flutter
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.12.2


dependencies:
  flutter:
    sdk: flutter
  # Iconos por defecto de iOS
  cupertino_icons: ^1.0.6

  # [Cámara] - Para visualizar el video en tiempo real
  camera: ^0.11.0

  # [Cerebro de IA] - Google ML Kit (100% Offline)
  google_mlkit_image_labeling: ^0.14.0

  # [Sonido] - Para reproducir y detener la alarma
  audioplayers: ^6.0.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0

flutter:

  
  uses-material-design: true